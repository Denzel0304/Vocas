<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>단어 암기장</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #87CEEB;
    --sky-light: #E8F6FF;
    --sky-mid: #B8E0F7;
    --sky-deep: #5BB3D9;
    --sky-dark: #2E86AB;
    --mint: #A8E6CF;
    --peach: #FFD3B6;
    --lavender: #D4B8E0;
    --yellow: #FFF3B0;
    --coral: #FFB5A7;
    --white: #FFFFFF;
    --text: #2C3E50;
    --text-muted: #7F8C9A;
    --radius: 20px;
    --radius-sm: 12px;
    --shadow: 0 8px 30px rgba(135,206,235,0.35);
    --shadow-sm: 0 4px 16px rgba(135,206,235,0.25);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: 'Nunito', 'Noto Sans KR', sans-serif;
    background: linear-gradient(160deg, #E8F6FF 0%, #D4EDFF 50%, #C8E8FF 100%);
    min-height: 100vh;
    color: var(--text);
    overflow-x: hidden;
  }

  /* ── LOADING ── */
  #loading {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(160deg, #E8F6FF, #C8E8FF);
    z-index: 999;
    gap: 16px;
  }
  #loading .logo { font-size: 52px; }
  #loading .loading-text { font-size: 16px; color: var(--sky-dark); font-weight: 600; }
  #loading.hidden { display: none; }

  /* ── SCREENS ── */
  .screen { display: none; padding-bottom: 40px; animation: fadeIn 0.25s ease; }
  .screen.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* ── COMMON HEADER ── */
  .page-header {
    background: linear-gradient(135deg, var(--sky-deep) 0%, var(--sky-dark) 100%);
    padding: 48px 20px 28px;
    border-radius: 0 0 36px 36px;
    position: relative;
  }
  .page-header h1 { font-size: 26px; font-weight: 800; color: #fff; text-align: center; }
  .page-header p { font-size: 13px; color: rgba(255,255,255,0.8); text-align: center; margin-top: 4px; }
  .back-btn {
    position: absolute; top: 14px; left: 14px;
    background: rgba(255,255,255,0.22);
    border: none; border-radius: 50%;
    width: 38px; height: 38px;
    font-size: 18px; cursor: pointer; color: #fff;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .back-btn:active { background: rgba(255,255,255,0.4); }

  /* ── DAY SELECT ── */
  .day-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 24px 16px;
  }
  .day-card {
    background: var(--white);
    border-radius: var(--radius-sm);
    padding: 16px 8px;
    text-align: center;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    transition: all 0.2s;
    border: 2px solid transparent;
    user-select: none;
  }
  .day-card:active { transform: scale(0.95); }
  .day-card.done { border-color: var(--sky-mid); background: var(--sky-light); }
  .day-num { font-size: 18px; font-weight: 800; color: var(--sky-dark); }
  .day-count { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .day-stars { font-size: 12px; color: #F4C430; margin-top: 4px; letter-spacing: 1px; }

  /* ── MODE SELECT ── */
  .mode-grid { padding: 24px 16px; display: flex; flex-direction: column; gap: 14px; }
  .mode-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 18px 20px;
    cursor: pointer;
    box-shadow: var(--shadow-sm);
    display: flex; align-items: center; gap: 16px;
    transition: all 0.2s;
    border: 2px solid transparent;
    user-select: none;
  }
  .mode-card:active { transform: scale(0.97); border-color: var(--sky-mid); }
  .mode-icon {
    width: 52px; height: 52px; border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; flex-shrink: 0;
  }
  .mode-card h3 { font-size: 16px; font-weight: 700; }
  .mode-card p { font-size: 12px; color: var(--text-muted); margin-top: 2px; line-height: 1.4; }
  .mode-disabled { opacity: 0.4; pointer-events: none; }

  /* ── PROGRESS BAR ── */
  .progress-wrap { margin: 0 0 6px; }
  .progress-bar-bg { background: rgba(255,255,255,0.3); border-radius: 99px; height: 6px; }
  .progress-bar { background: #fff; border-radius: 99px; height: 6px; transition: width 0.4s ease; }
  .progress-label { color: rgba(255,255,255,0.9); font-size: 12px; font-weight: 700; text-align: right; margin-top: 4px; }

  /* ── FLASH CARD ── */
  .card-area { padding: 20px 16px; }
  .tag {
    font-size: 11px; font-weight: 700;
    padding: 3px 10px; border-radius: 99px;
    display: inline-block; margin-bottom: 10px;
  }
  .flip-card { perspective: 1000px; height: 230px; cursor: pointer; margin-bottom: 16px; user-select: none; }
  .flip-inner {
    position: relative; width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .flip-inner.flipped { transform: rotateY(180deg); }
  .flip-front, .flip-back {
    position: absolute; width: 100%; height: 100%;
    backface-visibility: hidden;
    border-radius: var(--radius);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    box-shadow: var(--shadow); padding: 24px;
  }
  .flip-front { background: var(--white); }
  .flip-back { transform: rotateY(180deg); background: linear-gradient(135deg, #dff2fc, #c5e8f7); }
  .flash-word { font-size: 36px; font-weight: 800; color: var(--sky-dark); text-align: center; word-break: break-word; }
  .flash-hint { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
  .flash-meaning { font-size: 28px; font-weight: 700; color: var(--sky-dark); text-align: center; word-break: break-all; }
  .flash-word-sm { font-size: 15px; color: var(--text-muted); margin-top: 6px; }
  .sound-btn {
    background: var(--sky-light); border: none; border-radius: 50%;
    width: 42px; height: 42px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; margin-top: 10px; transition: all 0.15s;
    flex-shrink: 0;
  }
  .sound-btn:active { transform: scale(0.88); background: var(--sky-mid); }
  .action-row { display: flex; gap: 12px; margin-top: 4px; }
  .btn-know, .btn-dunno {
    flex: 1; padding: 16px 8px; border: none; border-radius: var(--radius-sm);
    font-family: inherit; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .btn-know { background: var(--mint); color: #1a6b46; }
  .btn-dunno { background: var(--coral); color: #8b2a1e; }
  .btn-know:active, .btn-dunno:active { transform: scale(0.95); }
  .nav-row { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
  .nav-btn {
    background: var(--white); border: 2px solid var(--sky-mid);
    border-radius: 50%; width: 44px; height: 44px;
    font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .nav-btn:active { background: var(--sky-mid); transform: scale(0.92); }
  .shuffle-btn {
    background: var(--lavender); border: none; border-radius: var(--radius-sm);
    padding: 10px 18px; font-family: inherit; font-size: 13px; font-weight: 700;
    color: #5a3a7e; cursor: pointer; transition: all 0.15s;
  }
  .shuffle-btn:active { transform: scale(0.95); }

  /* ── BLINK ── */
  .blink-card {
    background: var(--white); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 30px 20px;
    text-align: center; min-height: 210px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    margin-bottom: 16px; position: relative;
  }
  .blink-timer {
    position: absolute; top: 12px; right: 16px;
    font-size: 30px; font-weight: 800; color: var(--sky-mid);
    line-height: 1; transition: color 0.3s;
  }
  .blink-timer.urgent { color: var(--coral); }
  .blink-word { font-size: 38px; font-weight: 800; color: var(--sky-dark); word-break: break-word; }
  .blink-meaning {
    font-size: 26px; font-weight: 700; color: var(--sky-dark);
    opacity: 0; transition: opacity 0.5s; margin-top: 10px;
  }
  .blink-meaning.show { opacity: 1; }
  .blink-controls { display: flex; gap: 10px; }
  .ctrl-btn {
    flex: 1; padding: 14px 8px; border: none; border-radius: var(--radius-sm);
    font-family: inherit; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.15s; user-select: none;
  }
  .ctrl-btn.primary { background: var(--sky-deep); color: #fff; }
  .ctrl-btn.secondary { background: var(--sky-light); color: var(--sky-dark); border: 2px solid var(--sky-mid); }
  .ctrl-btn:active { transform: scale(0.95); }
  .speed-row {
    display: flex; align-items: center; gap: 10px;
    margin-top: 14px; padding: 0 2px;
  }
  .speed-row label { font-size: 13px; color: var(--text-muted); font-weight: 600; white-space: nowrap; }
  .speed-row input[type=range] { flex: 1; accent-color: var(--sky-deep); height: 4px; }
  .speed-val { font-size: 13px; font-weight: 700; color: var(--sky-dark); white-space: nowrap; min-width: 30px; text-align: right; }

  /* ── QUIZ ── */
  .quiz-q-card {
    background: var(--white); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 28px 20px 20px;
    text-align: center; margin-bottom: 16px;
  }
  .quiz-word { font-size: 34px; font-weight: 800; color: var(--sky-dark); word-break: break-word; }
  .quiz-options { display: flex; flex-direction: column; gap: 10px; }
  .quiz-opt {
    background: var(--white); border: 2px solid var(--sky-mid);
    border-radius: var(--radius-sm); padding: 16px 14px;
    font-family: inherit; font-size: 15px; font-weight: 600;
    cursor: pointer; text-align: left; transition: all 0.15s;
    color: var(--text); user-select: none;
  }
  .quiz-opt:active { background: var(--sky-light); }
  .quiz-opt.correct { background: #d4f5e4; border-color: #27ae60; color: #1a6b46; }
  .quiz-opt.wrong { background: #fde8e8; border-color: #e74c3c; color: #8b2a1e; }
  .quiz-score-bar {
    font-size: 13px; color: var(--text-muted); font-weight: 600;
    text-align: center; margin-top: 10px;
  }

  /* ── RESULT ── */
  .result-wrap { padding: 20px 16px; }
  .result-card {
    background: var(--white); border-radius: var(--radius);
    box-shadow: var(--shadow); padding: 36px 24px;
    text-align: center; margin-bottom: 16px;
  }
  .result-emoji { font-size: 56px; margin-bottom: 8px; }
  .result-pct { font-size: 52px; font-weight: 800; color: var(--sky-dark); line-height: 1; }
  .result-msg { font-size: 18px; font-weight: 700; color: var(--text); margin-top: 8px; }
  .result-detail { font-size: 13px; color: var(--text-muted); margin-top: 12px; line-height: 1.7; }
  .result-btns { display: flex; gap: 12px; }

  /* ── WRONG LIST ── */
  .wrong-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .wrong-item {
    background: var(--white); border-radius: var(--radius-sm);
    padding: 12px 16px; display: flex; justify-content: space-between;
    align-items: center; box-shadow: var(--shadow-sm);
    font-size: 14px;
  }
  .wrong-item .ww { font-weight: 700; color: var(--sky-dark); }
  .wrong-item .wm { color: var(--text-muted); }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="logo">📖</div>
  <div class="loading-text">단어 불러오는 중...</div>
</div>

<!-- ① DAY SELECT -->
<div class="screen" id="screen-day">
  <div class="page-header" style="padding-top:52px;">
    <h1>📖 단어 암기장</h1>
    <p id="totalInfo">Day를 선택해서 시작하세요</p>
  </div>
  <div class="day-grid" id="dayGrid"></div>
</div>

<!-- ② MODE SELECT -->
<div class="screen" id="screen-mode">
  <div class="page-header" style="position:relative;">
    <button class="back-btn" onclick="goTo('screen-day')">←</button>
    <h1 id="modeTitle">Day 1</h1>
    <p id="modeSubtitle">단어 개수 로딩 중</p>
  </div>
  <div class="mode-grid">
    <div class="mode-card" onclick="startMode('flash')">
      <div class="mode-icon" style="background:#E8F6FF;">🃏</div>
      <div><h3>플래시카드</h3><p>탭하면 뒤집혀요 · 알았어요/모르겠어요 분류</p></div>
    </div>
    <div class="mode-card" onclick="startMode('blink')">
      <div class="mode-icon" style="background:#FFF3B0;">⚡</div>
      <div><h3>깜빡이 모드</h3><p>단어 표시 후 자동으로 뜻 공개</p></div>
    </div>
    <div class="mode-card" onclick="startMode('quiz')">
      <div class="mode-icon" style="background:#A8E6CF;">🎯</div>
      <div><h3>퀴즈 모드</h3><p>4지선다 · 맞춘 개수로 점수 확인</p></div>
    </div>
    <div class="mode-card" id="retryModeCard" onclick="startMode('retry')">
      <div class="mode-icon" style="background:#FFB5A7;">🔁</div>
      <div><h3>틀린 단어만</h3><p>❌ 표시한 단어만 다시 도전</p></div>
    </div>
  </div>
</div>

<!-- ③ FLASH CARD -->
<div class="screen" id="screen-flash">
  <div class="page-header" style="position:relative;">
    <button class="back-btn" onclick="endStudy()">←</button>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar" id="flashPB" style="width:0%"></div></div>
      <div class="progress-label" id="flashPL"></div>
    </div>
  </div>
  <div class="card-area">
    <div class="flip-card" id="flipCard" onclick="flipCard()">
      <div class="flip-inner" id="flipInner">
        <div class="flip-front">
          <span class="tag" id="flashTag" style="background:#E8F6FF;color:#2E86AB;"></span>
          <div class="flash-word" id="flashWord"></div>
          <div class="flash-hint">탭하면 뜻이 나와요</div>
          <button class="sound-btn" onclick="event.stopPropagation();speak()">🔊</button>
        </div>
        <div class="flip-back">
          <span class="tag" id="flashTagB" style="background:#c5e8f7;color:#2E86AB;"></span>
          <div class="flash-meaning" id="flashMeaning"></div>
          <div class="flash-word-sm" id="flashWordSm"></div>
          <button class="sound-btn" onclick="event.stopPropagation();speak()">🔊</button>
        </div>
      </div>
    </div>
    <div class="action-row">
      <button class="btn-dunno" onclick="markCard(false)">❌ 모르겠어요</button>
      <button class="btn-know"  onclick="markCard(true)">✅ 알았어요!</button>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="moveFlash(-1)">←</button>
      <button class="shuffle-btn" onclick="shuffleCards()">🔀 섞기</button>
      <button class="nav-btn" onclick="moveFlash(1)">→</button>
    </div>
  </div>
</div>

<!-- ④ BLINK -->
<div class="screen" id="screen-blink">
  <div class="page-header" style="position:relative;">
    <button class="back-btn" onclick="endStudy()">←</button>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar" id="blinkPB" style="width:0%"></div></div>
      <div class="progress-label" id="blinkPL"></div>
    </div>
  </div>
  <div class="card-area">
    <div class="blink-card">
      <div class="blink-timer" id="blinkTimer"></div>
      <span class="tag" id="blinkTag" style="background:#FFF3B0;color:#8a6e00;"></span>
      <div class="blink-word" id="blinkWord"></div>
      <div class="blink-meaning" id="blinkMeaning"></div>
    </div>
    <div class="blink-controls">
      <button class="ctrl-btn secondary" onclick="blinkStep(-1)">← 이전</button>
      <button class="ctrl-btn primary" id="blinkPlayBtn" onclick="toggleBlink()">⏸ 일시정지</button>
      <button class="ctrl-btn secondary" onclick="blinkStep(1)">다음 →</button>
    </div>
    <div class="speed-row">
      <label>표시 시간</label>
      <input type="range" min="1" max="8" value="3" step="0.5" id="speedSlider" oninput="updateSpeed(this.value)">
      <span class="speed-val" id="speedVal">3.0초</span>
    </div>
  </div>
</div>

<!-- ⑤ QUIZ -->
<div class="screen" id="screen-quiz">
  <div class="page-header" style="position:relative;">
    <button class="back-btn" onclick="endStudy()">←</button>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar" id="quizPB" style="width:0%"></div></div>
      <div class="progress-label" id="quizPL"></div>
    </div>
  </div>
  <div class="card-area">
    <div class="quiz-q-card">
      <span class="tag" id="quizTag" style="background:#A8E6CF;color:#1a6b46;"></span>
      <div class="quiz-word" id="quizWord"></div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">이 단어의 뜻은?</div>
      <button class="sound-btn" onclick="speak()" style="margin-top:8px;">🔊</button>
    </div>
    <div class="quiz-options" id="quizOpts"></div>
    <div class="quiz-score-bar" id="quizScoreBar"></div>
  </div>
</div>

<!-- ⑥ RESULT -->
<div class="screen" id="screen-result">
  <div class="page-header" style="position:relative; padding-top:52px;">
    <button class="back-btn" onclick="goTo('screen-mode')">←</button>
    <h1>결과</h1>
  </div>
  <div class="result-wrap">
    <div class="result-card">
      <div class="result-emoji" id="resEmoji">🎉</div>
      <div class="result-pct" id="resPct"></div>
      <div class="result-msg" id="resMsg"></div>
      <div class="result-detail" id="resDetail"></div>
    </div>
    <!-- 틀린 단어 목록 -->
    <div id="wrongSection" style="display:none;">
      <div style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:8px;">❌ 틀린 단어 목록</div>
      <div class="wrong-list" id="wrongList"></div>
    </div>
    <div class="result-btns" style="margin-top:16px;">
      <button class="ctrl-btn secondary" onclick="goTo('screen-mode')" style="flex:1;">← 다시 선택</button>
      <button class="ctrl-btn primary" id="retryBtn" onclick="startMode('retry')" style="flex:1;display:none;">🔁 틀린것 재도전</button>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════
//  STATE
// ════════════════════════════════════════
let VOCAB = [];          // 전체 단어 배열
let byDay = {};          // { 1: [...], 2: [...] }
let allMeanings = [];    // 퀴즈 오답 풀

let currentDay  = 1;
let currentMode = 'flash';
let cards       = [];
let cardIdx     = 0;

let knownSet   = new Set();
let unknownSet = new Set();

// Blink
let blinkTimer    = null;
let blinkInterval = null;
let blinkDelay    = 3.0;
let blinkPlaying  = true;

// Quiz
let quizScore    = 0;
let quizAnswered = false;

// TTS
let currentWord = '';

// Progress persist
const SAVE_KEY = 'vocab_saves_v2';
let saves = {};
try { saves = JSON.parse(localStorage.getItem(SAVE_KEY) || '{}'); } catch(e) {}

function saveProg() {
  saves[currentDay] = { known: [...knownSet], unknown: [...unknownSet] };
  localStorage.setItem(SAVE_KEY, JSON.stringify(saves));
}

// ════════════════════════════════════════
//  LOAD words.json
// ════════════════════════════════════════
async function loadWords() {
  try {
    const res = await fetch('words.json');
    if (!res.ok) throw new Error('fetch fail');
    VOCAB = await res.json();
  } catch(e) {
    // fallback: 샘플 내장
    VOCAB = [
      {day:1,word:"apple",meaning:"사과"},{day:1,word:"banana",meaning:"바나나"},
      {day:1,word:"cherry",meaning:"체리"},{day:1,word:"dragon fruit",meaning:"용과"},
      {day:1,word:"emerge",meaning:"나타나다"},{day:1,word:"fierce",meaning:"사나운"},
      {day:1,word:"genuine",meaning:"진짜의"},{day:1,word:"humble",meaning:"겸손한"},
      {day:2,word:"imagine",meaning:"상상하다"},{day:2,word:"journey",meaning:"여행"},
      {day:2,word:"knowledge",meaning:"지식"},{day:2,word:"liberty",meaning:"자유"},
      {day:2,word:"magnificent",meaning:"웅장한"},{day:2,word:"navigate",meaning:"탐색하다"},
      {day:2,word:"observe",meaning:"관찰하다"},{day:2,word:"precious",meaning:"소중한"},
    ];
  }

  // 그룹화
  byDay = {};
  VOCAB.forEach(v => {
    if (!byDay[v.day]) byDay[v.day] = [];
    byDay[v.day].push(v);
  });
  allMeanings = VOCAB.map(v => v.meaning);

  document.getElementById('loading').classList.add('hidden');
  buildDayGrid();
  goTo('screen-day');
}

// ════════════════════════════════════════
//  DAY GRID
// ════════════════════════════════════════
function buildDayGrid() {
  const grid = document.getElementById('dayGrid');
  const days = Object.keys(byDay).sort((a,b) => +a - +b);
  grid.innerHTML = '';
  days.forEach(d => {
    const words = byDay[d];
    const sv = saves[d];
    const knownCnt = sv?.known?.length || 0;
    const pct = words.length ? knownCnt / words.length : 0;
    let stars = '☆☆☆';
    if (pct >= 0.8)  stars = '★★★';
    else if (pct >= 0.5) stars = '★★☆';
    else if (pct > 0) stars = '★☆☆';

    const card = document.createElement('div');
    card.className = 'day-card' + (pct > 0 ? ' done' : '');
    card.innerHTML = `
      <div class="day-num">Day ${d}</div>
      <div class="day-count">${words.length}단어</div>
      <div class="day-stars">${stars}</div>
    `;
    card.onclick = () => selectDay(+d);
    grid.appendChild(card);
  });

  const total = VOCAB.length;
  const days_cnt = days.length;
  document.getElementById('totalInfo').textContent = `총 ${days_cnt}일 · ${total}개 단어`;
}

function selectDay(d) {
  currentDay = d;
  const sv = saves[d] || {};
  knownSet   = new Set(sv.known   || []);
  unknownSet = new Set(sv.unknown || []);

  document.getElementById('modeTitle').textContent   = `Day ${d}`;
  document.getElementById('modeSubtitle').textContent = `${byDay[d].length}단어 · 모드를 선택하세요`;

  const unknownCnt = [...unknownSet].filter(w => byDay[d].some(c => c.word === w)).length;
  const retryCard = document.getElementById('retryModeCard');
  retryCard.classList.toggle('mode-disabled', unknownCnt === 0);

  goTo('screen-mode');
}

// ════════════════════════════════════════
//  MODE START
// ════════════════════════════════════════
function startMode(mode) {
  currentMode = mode;
  clearBlink();

  if (mode === 'retry') {
    cards = byDay[currentDay].filter(c => unknownSet.has(c.word));
    if (!cards.length) { alert('아직 틀린 단어가 없어요!'); return; }
  } else {
    cards = [...byDay[currentDay]];
  }

  cardIdx    = 0;
  quizScore  = 0;

  if (mode === 'flash' || mode === 'retry') { renderFlash(); goTo('screen-flash'); }
  else if (mode === 'blink') { startBlink(); goTo('screen-blink'); }
  else if (mode === 'quiz')  { renderQuiz();  goTo('screen-quiz'); }
}

function endStudy() { clearBlink(); goTo('screen-mode'); }

// ════════════════════════════════════════
//  FLASH CARD
// ════════════════════════════════════════
function renderFlash() {
  const c = cards[cardIdx];
  if (!c) return;
  currentWord = c.word;
  document.getElementById('flashTag').textContent  = `Day ${c.day}`;
  document.getElementById('flashTagB').textContent = `Day ${c.day}`;
  document.getElementById('flashWord').textContent    = c.word;
  document.getElementById('flashMeaning').textContent = c.meaning;
  document.getElementById('flashWordSm').textContent  = c.word;
  document.getElementById('flipInner').classList.remove('flipped');
  setPB('flash', cardIdx + 1, cards.length);
}

function flipCard() {
  document.getElementById('flipInner').classList.toggle('flipped');
}

function markCard(known) {
  const c = cards[cardIdx];
  if (known) { knownSet.add(c.word); unknownSet.delete(c.word); }
  else       { unknownSet.add(c.word); knownSet.delete(c.word); }
  saveProg();
  moveFlash(1);
}

function moveFlash(dir) {
  const next = cardIdx + dir;
  if (next >= cards.length) { showResult(); return; }
  if (next < 0) return;
  cardIdx = next;
  renderFlash();
}

function shuffleCards() {
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  cardIdx = 0;
  renderFlash();
}

// ════════════════════════════════════════
//  BLINK MODE
// ════════════════════════════════════════
function startBlink() {
  blinkPlaying = true;
  document.getElementById('blinkPlayBtn').textContent = '⏸ 일시정지';
  renderBlink();
  scheduleBlink();
}

function renderBlink() {
  const c = cards[cardIdx];
  if (!c) return;
  currentWord = c.word;
  document.getElementById('blinkTag').textContent     = `Day ${c.day}`;
  document.getElementById('blinkWord').textContent    = c.word;
  document.getElementById('blinkMeaning').textContent = c.meaning;
  document.getElementById('blinkMeaning').classList.remove('show');
  document.getElementById('blinkTimer').textContent   = '';
  document.getElementById('blinkTimer').classList.remove('urgent');
  setPB('blink', cardIdx + 1, cards.length);
}

let blinkCountInterval = null;
function scheduleBlink() {
  clearBlink();
  if (!blinkPlaying) return;

  let t = blinkDelay;
  document.getElementById('blinkTimer').textContent = t.toFixed(0);
  document.getElementById('blinkTimer').classList.remove('urgent');

  // 카운트다운
  blinkCountInterval = setInterval(() => {
    t -= 0.5;
    const el = document.getElementById('blinkTimer');
    el.textContent = Math.max(0, t).toFixed(0);
    if (t <= 1.5) el.classList.add('urgent');
  }, 500);

  // 뜻 공개
  blinkTimer = setTimeout(() => {
    clearInterval(blinkCountInterval);
    document.getElementById('blinkTimer').textContent = '';
    document.getElementById('blinkMeaning').classList.add('show');

    // 다음 카드
    blinkTimer = setTimeout(() => {
      if (cardIdx + 1 < cards.length) { cardIdx++; renderBlink(); scheduleBlink(); }
      else { clearBlink(); showResult(); }
    }, blinkDelay * 600);
  }, blinkDelay * 1000);
}

function clearBlink() {
  clearTimeout(blinkTimer);
  clearInterval(blinkCountInterval);
}

function toggleBlink() {
  blinkPlaying = !blinkPlaying;
  document.getElementById('blinkPlayBtn').textContent = blinkPlaying ? '⏸ 일시정지' : '▶ 재생';
  if (blinkPlaying) scheduleBlink(); else clearBlink();
}

function blinkStep(dir) {
  clearBlink();
  const next = cardIdx + dir;
  if (next < 0 || next >= cards.length) return;
  cardIdx = next;
  renderBlink();
  if (blinkPlaying) scheduleBlink();
}

function updateSpeed(v) {
  blinkDelay = parseFloat(v);
  document.getElementById('speedVal').textContent = blinkDelay.toFixed(1) + '초';
}

// ════════════════════════════════════════
//  QUIZ MODE
// ════════════════════════════════════════
function renderQuiz() {
  const c = cards[cardIdx];
  if (!c) return;
  currentWord  = c.word;
  quizAnswered = false;

  document.getElementById('quizTag').textContent  = `Day ${c.day}`;
  document.getElementById('quizWord').textContent = c.word;
  document.getElementById('quizScoreBar').textContent = `점수: ${quizScore} / ${cardIdx}`;
  setPB('quiz', cardIdx + 1, cards.length);

  // 오답 3개
  const others = allMeanings.filter(m => m !== c.meaning);
  const wrong  = shuffle(others).slice(0, 3);
  const opts   = shuffle([...wrong, c.meaning]);

  const cont = document.getElementById('quizOpts');
  cont.innerHTML = '';
  opts.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = opt;
    btn.onclick = () => answerQuiz(btn, opt, c.meaning, c.word);
    cont.appendChild(btn);
  });
}

function answerQuiz(btn, chosen, correct, word) {
  if (quizAnswered) return;
  quizAnswered = true;

  document.querySelectorAll('.quiz-opt').forEach(b => {
    if (b.textContent === correct) b.classList.add('correct');
    else if (b === btn && chosen !== correct) b.classList.add('wrong');
  });

  if (chosen === correct) {
    quizScore++;
    knownSet.add(word); unknownSet.delete(word);
  } else {
    unknownSet.add(word); knownSet.delete(word);
  }
  saveProg();
  document.getElementById('quizScoreBar').textContent = `점수: ${quizScore} / ${cardIdx + 1}`;

  setTimeout(() => {
    if (cardIdx + 1 < cards.length) { cardIdx++; renderQuiz(); }
    else showResult();
  }, 1000);
}

// ════════════════════════════════════════
//  RESULT
// ════════════════════════════════════════
function showResult() {
  const total   = cards.length;
  const knownCnt = cards.filter(c => knownSet.has(c.word)).length;
  const pct     = total ? Math.round(knownCnt / total * 100) : 0;

  const emoji = pct >= 80 ? '🎉' : pct >= 50 ? '😊' : '💪';
  const msg   = pct >= 80 ? '완벽해요!' : pct >= 50 ? '잘하고 있어요!' : '다시 도전해봐요!';

  document.getElementById('resEmoji').textContent  = emoji;
  document.getElementById('resPct').textContent    = pct + '%';
  document.getElementById('resMsg').textContent    = msg;
  document.getElementById('resDetail').innerHTML =
    `✅ 아는 단어: <strong>${knownCnt}개</strong><br>❌ 모르는 단어: <strong>${total - knownCnt}개</strong>`;

  // 틀린 단어 목록
  const wrongWords = cards.filter(c => unknownSet.has(c.word));
  const ws = document.getElementById('wrongSection');
  if (wrongWords.length > 0) {
    ws.style.display = 'block';
    document.getElementById('wrongList').innerHTML = wrongWords.map(c =>
      `<div class="wrong-item"><span class="ww">${c.word}</span><span class="wm">${c.meaning}</span></div>`
    ).join('');
    document.getElementById('retryBtn').style.display = 'block';
  } else {
    ws.style.display = 'none';
    document.getElementById('retryBtn').style.display = 'none';
  }

  buildDayGrid();
  goTo('screen-result');
}

// ════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════
function setPB(mode, cur, total) {
  document.getElementById(mode + 'PB').style.width = (cur / total * 100).toFixed(1) + '%';
  document.getElementById(mode + 'PL').textContent  = `${cur} / ${total}`;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function speak() {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(currentWord);
  u.lang = 'en-US'; u.rate = 0.85;
  window.speechSynthesis.speak(u);
}

function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ════════════════════════════════════════
//  INIT
// ════════════════════════════════════════
loadWords();
</script>
