<style>
  #bn-overlay {
    position: fixed; inset: 0;
    background: rgba(46, 134, 171, 0.35);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 10000;
    opacity: 0;
    transition: opacity 0.25s ease;
    padding: 20px;
    font-family: 'Nunito', 'Noto Sans KR', sans-serif;
  }
  #bn-overlay.show { opacity: 1; }
  #bn-modal {
    background: #ffffff;
    border-radius: 24px;
    box-shadow: 0 12px 40px rgba(46, 134, 171, 0.4);
    max-width: 360px; width: 100%;
    overflow: hidden;
    transform: scale(0.92);
    transition: transform 0.25s ease;
  }
  #bn-overlay.show #bn-modal { transform: scale(1); }
  .bn-header {
    background: linear-gradient(135deg, #5BB3D9, #2E86AB);
    padding: 26px 22px 20px;
    text-align: center;
    color: #fff;
  }
  .bn-icon {
    font-size: 36px;
    margin-bottom: 6px;
    display: block;
  }
  .bn-title {
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -0.3px;
  }
  .bn-body {
    padding: 22px 24px 18px;
    color: #2C3E50;
    font-size: 14px;
    line-height: 1.7;
    letter-spacing: -0.2px;
  }
  .bn-body p { margin: 0 0 12px; }
  .bn-body p:last-child { margin-bottom: 0; }
  .bn-body .bn-strong {
    color: #2E86AB;
    font-weight: 800;
  }
  .bn-body .bn-tip {
    background: #E8F6FF;
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 13px;
    color: #2E86AB;
    margin-top: 14px;
  }
  .bn-footer {
    padding: 0 20px 20px;
  }
  .bn-btn {
    width: 100%;
    background: linear-gradient(135deg, #5BB3D9, #2E86AB);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(135, 206, 235, 0.4);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .bn-btn:active {
    transform: scale(0.97);
    box-shadow: 0 2px 8px rgba(135, 206, 235, 0.3);
  }
</style>

<div id="bn-overlay" role="dialog" aria-modal="true" aria-labelledby="bn-title">
  <div id="bn-modal">
    <div class="bn-header">
      <span class="bn-icon">🔊</span>
      <div class="bn-title" id="bn-title">발음 재생 안내</div>
    </div>
    <div class="bn-body">
      <p>모든 학습에는 <span class="bn-strong">발음이 재생</span>됩니다.</p>
      <p>만약 발음이 들리지 않으신다면, 상단의 주소를 복사하셔서 사용하시는 <span class="bn-strong">브라우저로 직접 접속</span>하시면 해결됩니다.</p>
      <div class="bn-tip">💡 이후에는 즐겨찾기로 저장해두시면 편하게 사용하실 수 있습니다.</div>
    </div>
    <div class="bn-footer">
      <button class="bn-btn" id="bn-ok">확인</button>
    </div>
  </div>
</div>
